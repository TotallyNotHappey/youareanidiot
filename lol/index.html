<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>idiot</title>
<link rel="icon" type="image/png" href="https://raw.githubusercontent.com/TotallyNotHappey/youareanidiot/refs/heads/main/you-are-an-idiot.png">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 100%;
    height: 100%;
    background: black;
    overflow: hidden;
  }
  video {
    position: fixed;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    height: 100vh;
    width: auto;
    pointer-events: none;
  }
  #shield {
    position: fixed;
    top: 0; left: 0;
    width: 100vw;
    height: 100vh;
    z-index: 9999;
  }
</style>
</head>
<body>
<video id="v" autoplay loop muted playsinline>
  <source src="https://raw.githubusercontent.com/TotallyNotHappey/youareanidiot/refs/heads/main/you%20are%20an%20idiot!.mp4" type="video/mp4">
</video>
<div id="shield"></div>
<script>
  const v = document.getElementById('v');

  function tryPlay() {
    v.muted = true;
    v.play().then(() => {
      // Autoplay succeeded muted, now try unmuting
      v.muted = false;
      // If unmuting is blocked, wait for a click
      if (v.muted) {
        document.addEventListener('click', () => { v.muted = false; }, { once: true });
      }
    }).catch(() => {
      // Autoplay fully blocked, need a click
      document.addEventListener('click', () => {
        v.muted = false;
        v.play();
      }, { once: true });
    });
  }

  tryPlay();

  // Prevent pausing by any means
  v.addEventListener('pause', () => v.play());
  v.addEventListener('ended', () => { v.currentTime = 0; v.play(); });
  v.addEventListener('volumechange', () => {
    if (v.volume < 0.9) v.volume = 1;
  });

  // Block keyboard shortcuts (space, k, m, f, etc.)
  document.addEventListener('keydown', e => e.preventDefault());

  // Block right-click context menu
  document.addEventListener('contextmenu', e => e.preventDefault());

  // Keep playing if tab becomes visible again
  document.addEventListener('visibilitychange', () => {
    if (!document.hidden && v.paused) v.play();
  });
</script>
</body>
</html>
