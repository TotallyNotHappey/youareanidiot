<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 100%;
    height: 100%;
    background: black;
    overflow: hidden;
    cursor: pointer;
  }
  img {
    position: fixed;
    top: 0; left: 0;
    width: 100vw;
    height: 100vh;
    object-fit: cover;
  }
</style>
</head>
<body>
<img
  src="https://raw.githubusercontent.com/TotallyNotHappey/youareanidiot/refs/heads/main/youareanidiot.gif"
  alt="">
<audio id="a" loop muted autoplay>
  <source src="https://raw.githubusercontent.com/TotallyNotHappey/youareanidiot/refs/heads/main/youareanidiot.mp3" type="audio/mpeg">
</audio>
<script>
  const a = document.getElementById('a');
  let ready = false;

  a.play().then(() => {
    setTimeout(() => { a.muted = false; ready = true; }, 250);
  }).catch(() => {
    document.addEventListener('click', () => {
      a.muted = false;
      a.play();
      setTimeout(() => { ready = true; }, 250);
    }, { once: true });
  });

  document.addEventListener('click', () => {
    if (ready) window.location.href = 'https://youareanidiot.jesusfuckinchrist.com/lol';
  });
</script>
</body>
</html>
