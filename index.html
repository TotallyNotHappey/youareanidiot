<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 100%;
    height: 100%;
    background: black;
    overflow: hidden;
  }
  .responsive-gif {
    position: fixed;
    top: 0; left: 0;
    width: 100vw;
    height: 100vh;
    object-fit: contain;
    background: black;
  }
  #overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.75);
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    z-index: 10;
  }
  #overlay span {
    color: white;
    font-size: 2rem;
    font-family: sans-serif;
    border: 2px solid white;
    padding: 1rem 2rem;
    border-radius: 8px;
  }
</style>
</head>
<body>
<div id="overlay">
  <span>Click to Start</span>
</div>
<img class="responsive-gif"
  src="https://raw.githubusercontent.com/TotallyNotHappey/youareanidiot/refs/heads/main/youareanidiot.gif"
  alt="youareanidiot">
<audio id="audio" loop>
  <source src="https://raw.githubusercontent.com/TotallyNotHappey/youareanidiot/refs/heads/main/youareanidiot.mp3" type="audio/mpeg">
</audio>
<script>
  document.getElementById('overlay').addEventListener('click', function() {
    document.getElementById('audio').play();
    this.remove();
  });
</script>
</body>
</html>
