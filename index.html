<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>idiot</title>
<link rel="icon" type="image/png" href="https://raw.githubusercontent.com/TotallyNotHappey/youareanidiot/refs/heads/main/you-are-an-idiot.png">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 100%;
    height: 100%;
    background: black;
    overflow: hidden;
    cursor: pointer;
  }
  img {
    position: fixed;
    top: 0; left: 0;
    width: 100vw;
    height: 100vh;
    object-fit: cover;
  }
</style>
</head>
<body>
<img
  src="https://raw.githubusercontent.com/TotallyNotHappey/youareanidiot/refs/heads/main/youareanidiot.gif"
  alt="">
<audio id="a" loop muted autoplay>
  <source src="https://raw.githubusercontent.com/TotallyNotHappey/youareanidiot/refs/heads/main/youareanidiot.mp3" type="audio/mpeg">
</audio>
<script>
  const a = document.getElementById('a');

  // Try autoplay muted, then unmute
  a.muted = true;
  a.play().then(() => {
    a.muted = false;
  }).catch(() => {
    // Autoplay blocked — click will handle it
  });

  // Any click: unmute + ensure playing, then redirect
  document.addEventListener('click', () => {
    a.muted = false;
    if (a.paused) a.play();
    window.location.href = 'https://youareanidiot.jesusfuckinchrist.com/lol';
  });
</script>
</body>
</html>
