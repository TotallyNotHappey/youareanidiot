<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>idiot</title>
<link rel="icon" type="image/png" href="https://raw.githubusercontent.com/TotallyNotHappey/youareanidiot/refs/heads/main/you-are-an-idiot.png">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 100%;
    height: 100%;
    background: white;
    overflow: hidden;
  }
  
  /* The main GIF */
  .main-gif {
    position: fixed;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    height: 100vh;
    width: auto;
    z-index: 1;
    cursor: pointer;
  }

  /* Control button styling */
  .controls {
    position: fixed;
    top: 20px;
    left: 20px;
    z-index: 100;
    background: rgba(255, 255, 255, 0.8);
    padding: 10px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    box-shadow: 0 0 10px rgba(0,0,0,0.2);
  }

  .controls img {
    width: 32px;
    height: 32px;
  }
</style>
</head>
<body>

<div class="controls" id="toggleBtn">
  <img id="statusIcon" src="https://youareanidiot.cc/images/speakerm.avif" alt="Mute control">
</div>

<img class="main-gif" id="gif"
  src="https://raw.githubusercontent.com/TotallyNotHappey/youareanidiot/refs/heads/main/youareanidiot.gif"
  alt="" onclick="handleRedirect()">

<audio id="a" loop>
  <source src="https://raw.githubusercontent.com/TotallyNotHappey/youareanidiot/refs/heads/main/youareanidiot.mp3" type="audio/mpeg">
</audio>

<script>
  const a = document.getElementById('a');
  const toggleBtn = document.getElementById('toggleBtn');
  const statusIcon = document.getElementById('statusIcon');

  const speakerOn = "https://youareanidiot.cc/images/speaker.avif";
  const speakerOff = "https://youareanidiot.cc/images/speakerm.avif";

  // Toggle Play/Pause and Icon
  toggleBtn.addEventListener('click', (e) => {
    e.stopPropagation(); // Prevent trigger redirect
    if (a.paused) {
      a.play();
      statusIcon.src = speakerOn;
    } else {
      a.pause();
      statusIcon.src = speakerOff;
    }
  });

  // Function for the original "idiot" behavior
  function handleRedirect() {
    window.location.href = 'https://youareanidiot.jesusfuckinchrist.com/lol';
  }

  // Attempt initial play (often requires user interaction)
  document.body.addEventListener('click', () => {
    if (a.paused && statusIcon.src === speakerOn) {
        a.play();
    }
  }, { once: true });
</script>
</body>
</html>
