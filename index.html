<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 100%;
    height: 100%;
    background: black;
    overflow: hidden;
  }
  .responsive-gif {
    position: fixed;
    top: 0; left: 0;
    width: 100vw;
    height: 100vh;
    object-fit: cover;
  }
</style>
</head>
<body>
<img class="responsive-gif"
  src="https://raw.githubusercontent.com/TotallyNotHappey/youareanidiot/refs/heads/main/youareanidiot.gif"
  alt="youareanidiot">
<audio id="audio" loop muted autoplay>
  <source src="https://raw.githubusercontent.com/TotallyNotHappey/youareanidiot/refs/heads/main/youareanidiot.mp3" type="audio/mpeg">
</audio>
<script>
  const audio = document.getElementById('audio');
  audio.play().then(() => {
    setTimeout(() => {
      audio.muted = false;
    }, 250);
  }).catch(() => {
    document.addEventListener('click', () => {
      setTimeout(() => {
        audio.muted = false;
        audio.play();
      }, 250);
    }, { once: true });
  });
</script>
</body>
</html>
